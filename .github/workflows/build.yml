name: Build & Package

on:
  push:
    branches: [master]
    # Tag pushes are what trigger the Discord announce. The rolling
    # "latest" release still gets published on every master merge.
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter boundless-grimoire typecheck

      - name: Build
        run: pnpm --filter boundless-grimoire build

      - name: Package extension zip
        run: cd extensions/boundless-grimoire/dist && zip -r ../../../boundless-grimoire.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boundless-grimoire
          path: boundless-grimoire.zip

      # Only publish a downloadable release on actual merges to master,
      # not on PR runs. A rolling "latest" tag is overwritten each push
      # so anyone can grab the newest build from the Releases page.
      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatically built from `master` @ ${{ github.sha }}.
          files: boundless-grimoire.zip
          prerelease: true
          make_latest: false

      # Check Chrome Web Store status before attempting publish. If the
      # previous version is still in review (PENDING), fail early with
      # a clear message instead of a cryptic ITEM_NOT_UPDATABLE error.
      - name: Check Chrome Web Store status
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          TOKEN=$(curl -sS -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CHROME_CLIENT_ID}" \
            -d "client_secret=${CHROME_CLIENT_SECRET}" \
            -d "refresh_token=${CHROME_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" | jq -r '.access_token')
          RESPONSE=$(curl -sS \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/penjpgjomhbkcndhilhhkomelnknkcgm?projection=DRAFT")
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          echo "Chrome Web Store status: ${STATUS}"
          if [ "$STATUS" = "PENDING" ]; then
            echo "::error::Previous version is still in review. Cannot publish until review completes."
            exit 1
          fi

      - name: Publish to Chrome Web Store
        id: cws
        if: startsWith(github.ref, 'refs/tags/v')
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: publish
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: penjpgjomhbkcndhilhhkomelnknkcgm
          zip_file: boundless-grimoire.zip

      # Announce only after a successful Chrome Store publish.
      - name: Announce tagged release in Discord
        if: startsWith(github.ref, 'refs/tags/v') && steps.cws.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping announcement."
            exit 0
          fi
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/latest/boundless-grimoire.zip"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          ROLE_ID="1490636376645963909"
          PAYLOAD=$(jq -n \
            --arg content "<@&${ROLE_ID}> Boundless Grimoire ${TAG} is out!" \
            --arg title "Boundless Grimoire ${TAG}" \
            --arg desc "Tagged release. [Download zip](${DOWNLOAD_URL}) · [Release notes](${RELEASE_URL})" \
            --arg url "$RELEASE_URL" \
            --arg roleId "$ROLE_ID" \
            '{
              username: "Boundless Grimoire",
              content: $content,
              allowed_mentions: { roles: [$roleId] },
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 16743226
              }]
            }')
          curl -sS -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
