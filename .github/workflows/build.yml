name: Build & Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter boundless-grimoire typecheck

      - name: Build
        run: pnpm --filter boundless-grimoire build

      - name: Package extension zip
        run: cd extensions/boundless-grimoire/dist && zip -r ../../../boundless-grimoire.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boundless-grimoire
          path: boundless-grimoire.zip

      # Only publish a downloadable release on actual merges to master,
      # not on PR runs. A rolling "latest" tag is overwritten each push
      # so anyone can grab the newest build from the Releases page.
      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatically built from `master` @ ${{ github.sha }}.
          files: boundless-grimoire.zip
          prerelease: true
          make_latest: false

      # Announce the new build in Discord. Runs only on merges to master,
      # and only when the webhook secret is configured (so forks/PRs don't
      # fail). The webhook fires an embed with the commit SHA, message,
      # and a direct download link for the zip.
      # Announce the new build in Discord. Runs only on merges to master.
      # The script itself no-ops when the webhook secret is missing, so
      # forks without the secret don't fail the workflow.
      - name: Announce in Discord
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping announcement."
            exit 0
          fi
          SHORT_SHA="${SHA:0:7}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/latest/boundless-grimoire.zip"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/latest"
          # Truncate the commit message's first line to ~200 chars.
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n 1 | cut -c1-200)
          PAYLOAD=$(jq -n \
            --arg title "New Boundless Grimoire build" \
            --arg desc "**${FIRST_LINE}**\n\nby ${AUTHOR} · [\`${SHORT_SHA}\`](${COMMIT_URL})" \
            --arg url "$RELEASE_URL" \
            --arg download "$DOWNLOAD_URL" \
            '{
              username: "Boundless Grimoire",
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 16743226,
                fields: [
                  { name: "Download", value: "[boundless-grimoire.zip](\($download))" }
                ]
              }]
            }')
          curl -sS -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
