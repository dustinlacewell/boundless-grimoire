name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter boundless-grimoire typecheck

      - name: Build
        run: pnpm --filter boundless-grimoire build

      - name: Package extension zip
        run: cd extensions/boundless-grimoire/dist && zip -r ../../../boundless-grimoire.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boundless-grimoire
          path: boundless-grimoire.zip
